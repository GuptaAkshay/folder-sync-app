name: folder_sync
description: "FolderSync - Keep your folders in sync between Google Drive and Android."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Authentication
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.4

  # Google Drive API
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Background sync
  workmanager: ^0.9.0+3

  # File system
  path_provider: ^2.1.5
  http: ^1.3.0

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logging: ^1.3.0
  file_picker: ^10.3.10
  path: ^1.9.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  # App icon generation
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFB247"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
